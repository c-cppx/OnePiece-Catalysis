    <path d="M91 233 C116 178 131 113 171 92 C205 74 233 91 253 113 L253 241 L91 241 Z" fill="url(#onepiece-studio-field-a)" opacity="0.96"/>
    <path d="M91 241 C120 198 155 174 188 171 C218 168 238 182 253 202 L253 241 Z" fill="url(#onepiece-studio-field-b)" opacity="0.97"/>
    <path d="M91 233 C116 178 131 113 171 92 C205 74 233 91 253 113" fill="none" stroke="#ffffff" stroke-width="5" stroke-linecap="round"/>
    <path d="M91 241 C120 198 155 174 188 171 C218 168 238 182 253 202" fill="none" stroke="#ffffff" stroke-width="5" stroke-linecap="round" opacity="0.9"/>
    <path d="M91 74 V241 H253" fill="none" stroke="#17313a" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M116 213 H253 M116 181 H253 M116 149 H253 M116 117 H253" stroke="#17313a" stroke-width="2.5" opacity="0.18"/>
    <path d="M123 74 V241 M155 74 V241 M187 74 V241 M219 74 V241" stroke="#17313a" stroke-width="2.5" opacity="0.18"/>
    <circle cx="123" cy="207" r="10" fill="#ffffff" stroke="#17313a" stroke-width="5"/>
    <circle cx="170" cy="126" r="10" fill="#ffffff" stroke="#17313a" stroke-width="5"/>
    <circle cx="224" cy="188" r="10" fill="#ffffff" stroke="#17313a" stroke-width="5"/>
