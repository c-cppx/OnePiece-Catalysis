    <text x="0" y="72" font-family="system-ui, 'system-ui', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="72" font-weight="750" letter-spacing="0" fill="#17212b">OnePiece Studio</text>
    <text x="4" y="122" font-family="system-ui, 'system-ui', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="30" font-weight="520" letter-spacing="0" fill="#52616c">Local Materials Workbench</text>
    <g transform="translate(4 154)">
