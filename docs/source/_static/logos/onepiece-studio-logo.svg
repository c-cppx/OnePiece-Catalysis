    <linearGradient id="onepiece-studio-field-b" x1="114" y1="218" x2="258" y2="82" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#d74f42"/>
      <stop offset="1" stop-color="#e4a04f"/>
    </linearGradient>
    <filter id="onepiece-studio-soft-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#18323a" flood-opacity="0.16"/>
