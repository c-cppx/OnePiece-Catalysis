<svg xmlns="http://www.w3.org/2000/svg" width="960" height="320" viewBox="0 0 960 320" role="img" aria-labelledby="title desc">
  <title id="title">OnePiece Studio logo</title>
  <desc id="desc">A local materials workbench logo with a phase diagram panel, atomic nodes, and OnePiece Studio wordmark.</desc>
  <defs>
    <linearGradient id="onepiece-studio-panel" x1="70" y1="42" x2="278" y2="252" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#eaf3f4"/>
      <stop offset="1" stop-color="#d8e7e4"/>
    </linearGradient>
    <linearGradient id="onepiece-studio-field-a" x1="82" y1="60" x2="242" y2="220" gradientUnits="userSpaceOnUse">
