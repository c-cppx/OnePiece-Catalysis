<svg xmlns="http://www.w3.org/2000/svg" width="960" height="320" viewBox="0 0 960 320" role="img" aria-labelledby="title desc">
  <title id="title">OnePiece logo</title>
  <desc id="desc">A local atomistic data package logo with a single connected lattice piece and OnePiece wordmark.</desc>
  <defs>
    <linearGradient id="onepiece-disc" x1="68" y1="46" x2="274" y2="274" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#f3f7fb"/>
      <stop offset="1" stop-color="#e2e7ef"/>
    </linearGradient>
    <linearGradient id="onepiece-core" x1="98" y1="74" x2="246" y2="238" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#5f6f91"/>
      <stop offset="1" stop-color="#2f7f8c"/>
    </linearGradient>
    <filter id="onepiece-soft-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#18253a" flood-opacity="0.15"/>
    </filter>
  </defs>

  <rect width="960" height="320" fill="#fbfcfd"/>

  <g filter="url(#onepiece-soft-shadow)">
    <circle cx="171" cy="160" r="114" fill="url(#onepiece-disc)" stroke="#17212b" stroke-width="6"/>
    <ellipse cx="171" cy="214" rx="74" ry="21" fill="none" stroke="#17212b" stroke-width="5" opacity="0.22"/>
    <ellipse cx="171" cy="160" rx="84" ry="30" fill="none" stroke="#17212b" stroke-width="5" opacity="0.22"/>
    <ellipse cx="171" cy="106" rx="74" ry="21" fill="none" stroke="#17212b" stroke-width="5" opacity="0.22"/>

    <path d="M121 118 L171 88 L222 118 L222 177 L171 207 L121 177 Z" fill="none" stroke="url(#onepiece-core)" stroke-width="13" stroke-linejoin="round"/>
    <path d="M121 118 L171 148 L222 118 M171 148 L171 207 M121 177 L171 148 L222 177" fill="none" stroke="#17212b" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" opacity="0.78"/>
    <circle cx="121" cy="118" r="14" fill="#ffffff" stroke="#2f7f8c" stroke-width="8"/>
    <circle cx="171" cy="88" r="14" fill="#ffffff" stroke="#5f6f91" stroke-width="8"/>
    <circle cx="222" cy="118" r="14" fill="#ffffff" stroke="#2f7f8c" stroke-width="8"/>
    <circle cx="222" cy="177" r="14" fill="#ffffff" stroke="#5f6f91" stroke-width="8"/>
    <circle cx="171" cy="207" r="14" fill="#ffffff" stroke="#2f7f8c" stroke-width="8"/>
    <circle cx="121" cy="177" r="14" fill="#ffffff" stroke="#5f6f91" stroke-width="8"/>
    <circle cx="171" cy="148" r="16" fill="#d74f42" stroke="#ffffff" stroke-width="6"/>
  </g>

  <g transform="translate(330 82)">
    <text x="0" y="72" font-family="Lucifer, 'Lucifer Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="84" font-weight="750" letter-spacing="0" fill="#17212b">OnePiece</text>
    <text x="4" y="122" font-family="Lucifer, 'Lucifer Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="30" font-weight="520" letter-spacing="0" fill="#52616c">Atomistic Data Core</text>
    <g transform="translate(4 154)">
      <circle cx="14" cy="14" r="8" fill="#2f7f8c"/>
      <circle cx="64" cy="14" r="8" fill="#5f6f91"/>
      <circle cx="114" cy="14" r="8" fill="#d74f42"/>
      <path d="M22 14 H56 M72 14 H106" stroke="#17212b" stroke-width="3" stroke-linecap="round" opacity="0.42"/>
      <text x="140" y="19" font-family="Lucifer, 'Lucifer Sans', sans-serif" font-size="14" font-weight="650" fill="#5b6470">structures + energies + provenance</text>
    </g>
  </g>
