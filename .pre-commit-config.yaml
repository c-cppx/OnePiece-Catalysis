repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: check-ast
      - id: check-yaml
      - id: end-of-file-fixer
      - id: trailing-whitespace
      - id: mixed-line-ending
        args: ["--fix=lf"]
      - id: check-merge-conflict
      - id: debug-statements

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.5.7
    hooks:
      - id: ruff
        args: ["--fix"]
      - id: ruff-format

  - repo: https://github.com/PyCQA/bandit
    rev: 1.9.4
    hooks:
      - id: bandit
        args: ["-c", "pyproject.toml", "-r", "src", "ui"]
        pass_filenames: false

  - repo: local
    hooks:
      - id: forbid-hardcoded-local-paths
        name: forbid hardcoded local paths
        language: pygrep
        entry: '(/Users/|file://|[A-Za-z]:\\)'
        types_or: [text]
        exclude: '^(docs/build/|docs/reports/.*\.log$)'
