name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install lint dependencies
        run: python -m pip install -U pip && python -m pip install -e .[dev]

      - name: Run Ruff
        run: python -m ruff check src tests examples

  test:
    name: Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install package and test dependencies
        run: python -m pip install -U pip && python -m pip install -e .[dev]

      - name: Run tests
        run: PYTHONPATH=src python -m pytest -q

      - name: Run bundled QA command
        run: PYTHONPATH=src python -m onepiece_studio.cli qa

  release-gate:
    name: Release gate
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install release-check dependencies
        run: python -m pip install -U pip && python -m pip install -e .[dev,docs,release]

      - name: Run release checks
        run: python scripts/release_check.py
