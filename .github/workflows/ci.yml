name: CI

on:
  push:
    branches:
      - main
      - master
      - fable-overhaul
  pull_request:
  workflow_dispatch:

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install lint dependencies
        run: python -m pip install -U pip && python -m pip install -e .[dev] -e ./ui

      - name: Run Ruff
        run: python -m ruff check src ui/src tests examples

  test:
    name: Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install packages and test dependencies
        run: python -m pip install -U pip && python -m pip install -e .[dev] -e ./ui

      - name: Run tests
        run: python -m pytest -q

      - name: Run bundled QA command
        run: python -m onepiece_studio.cli qa

  release-gate:
    name: Release gate
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install release-check dependencies
        run: python -m pip install -U pip && python -m pip install -e .[dev,docs,release] -e ./ui

      - name: Run release checks
        run: python scripts/release_check.py
